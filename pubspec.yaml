name: news_app
description: Ứng dụng đọc tin tức NewsFlow - Đồ án Lập trình Mobile

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - phiên bản tương thích với nhau (FlutterFire BOM ~3.x)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.1.3
  firebase_dynamic_links: ^6.0.8

  # State Management
  provider: ^6.1.1

  # Local Storage (SQLite)
  sqflite: ^2.3.0
  path: ^1.8.3

  # Networking
  http: ^1.1.2

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  share_plus: ^10.0.0
  image_picker: ^1.2.2
  timeago: ^3.6.0
  intl: ^0.19.0
  google_fonts: ^6.1.0

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Shared Preferences
  shared_preferences: ^2.2.2

  # Local Notifications
  flutter_local_notifications: ^17.2.2

  #ai text
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true